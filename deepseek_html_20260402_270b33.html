<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Киновикторина: Сетка сериалов 5x5</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* избегаем случайного выделения текста */
        }

        body {
            background: linear-gradient(145deg, #0b1a2e 0%, #0a111f 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* контейнер всей викторины */
        .quiz-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(10, 20, 30, 0.6);
            border-radius: 3rem;
            backdrop-filter: blur(2px);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            padding: 1.5rem;
        }

        h1 {
            text-align: center;
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFE6B0, #E6BC75);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 3px rgba(0,0,0,0.3);
            font-weight: 800;
        }

        .sub {
            text-align: center;
            color: #9ab3d5;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
            border-bottom: 1px dashed #2c4c6e;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 6px;
        }

        /* сетка 5x5 */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            background: rgba(0,0,0,0.2);
            border-radius: 2rem;
            padding: 12px;
        }

        /* карточка-клетка */
        .card {
            background: linear-gradient(145deg, #1e2a3a, #0f1a24);
            border-radius: 1.2rem;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,215,140,0.25);
            aspect-ratio: 4 / 3;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 28px rgba(0, 0, 0, 0.5);
            border-color: rgba(255,200,100,0.6);
        }

        /* область с кадром (симуляция изображения) */
        .frame {
            flex: 2;
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
        }

        /* декоративный значок "кадр" */
        .frame::after {
            content: "🎬";
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 1.3rem;
            opacity: 0.7;
            text-shadow: 0 0 2px black;
            pointer-events: none;
        }

        /* информационная нижняя часть */
        .info {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            padding: 8px 6px;
            text-align: center;
            border-top: 1px solid #e6bc7555;
        }

        .series-name {
            font-weight: bold;
            font-size: 0.85rem;
            color: #ffdd99;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
        }

        .action-phrase {
            font-size: 0.7rem;
            color: #c0e0ff;
            background: #00000066;
            border-radius: 20px;
            padding: 3px 6px;
            margin-top: 4px;
            display: inline-block;
            max-width: 100%;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
        }

        /* статус и кнопка сброса */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            background: #07131cee;
            border-radius: 60px;
            padding: 8px 18px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .score {
            background: #2c3e2e;
            padding: 5px 18px;
            border-radius: 32px;
            font-weight: bold;
            color: #d4ffb0;
            font-size: 1.2rem;
            box-shadow: inset 0 0 2px gold, 0 2px 5px black;
        }

        .message-area {
            background: #0e1a24;
            padding: 5px 16px;
            border-radius: 32px;
            color: #FFD966;
            font-weight: 500;
            font-size: 0.9rem;
        }

        button {
            background: #ffb347;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: bold;
            color: #1f2a2e;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #8b5a2b;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8b5a2b;
        }

        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 15px;
            color: #6e8db0;
        }

        /* отметка что клетка уже угадана */
        .card.revealed {
            opacity: 0.75;
            filter: grayscale(0.2);
            cursor: default;
            transform: none;
            border-color: #7a9f5a;
            box-shadow: 0 4px 8px black;
        }

        .card.revealed:hover {
            transform: none;
            box-shadow: 0 4px 8px black;
        }

        .card.revealed .action-phrase {
            text-decoration: line-through;
            color: #a5c6ff;
        }

        @media (max-width: 650px) {
            .grid {
                gap: 8px;
            }
            .series-name {
                font-size: 0.7rem;
            }
            .action-phrase {
                font-size: 0.6rem;
            }
            .info {
                padding: 5px 3px;
            }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>🎞️ СЕРИАЛОМАНИЯ 🎭</h1>
    <div style="text-align: center;"><span class="sub">найди кадр + название → кликни по фразе-действию</span></div>

    <div class="grid" id="gridContainer"></div>

    <div class="status-bar">
        <div class="score">🏆 Счёт: <span id="scoreValue">0</span> / 25</div>
        <div class="message-area" id="statusMessage">✨ Нажми на любую клетку, чтобы угадать сериал</div>
        <button id="resetBtn">🔄 Перетасовать всё</button>
    </div>
    <div class="footer-note">
        📺 В каждой клетке: кадр из сериала + название. Случайные варианты действий (фразы) помогут запомнить культовые моменты!
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // БАЗА ДАННЫХ: 25 культовых сериалов (кадр-описание + название)
    // Каждый объект: { frameDesc, title, phraseOptions }
    // Для каждой клетки мы случайным образом выберем одну из 3-х фраз, относящуюся к сериалу
    // --------------------------------------------------------------
    const SERIES_DB = [
        { frameDesc: "🕴️ Сломанный трейлер, лаборатория, синий кристалл", title: "Во все тяжкие", phrases: ["Я — опасность!", "Скажи моё имя.", "Химия — это искусство"] },
        { frameDesc: "🐉 Трон из мечей, драконы, зима близко", title: "Игра престолов", phrases: ["Зима близко.", "Ваша милость.", "Я не прошу прощения."] },
        { frameDesc: "📦 Парк, ящик с золотом, семейные тайны", title: "Очень странные дела", phrases: ["Яйца вафли!", "Майнд Флейер", "Обратно в Апсайд-Даун"] },
        { frameDesc: "💼 Адвокатская контора, Чикаго, резкие споры", title: "Лучше звоните Солу", phrases: ["Лучше звоните Солу!", "Макгилл в деле", "Это не преступление, если адвокат"] },
        { frameDesc: "🤖 Роботы, парк развлечений, ковбой", title: "Мир Дикого Запада", phrases: ["Не похоже ни на что.", "Эти жестокие наслаждения", "Кормит ли ворон?"] },
        { frameDesc: "🧠 Отдел убийств, холодный детектив, канцелярия", title: "Настоящий детектив", phrases: ["Время — плоский круг.", "Каркоза", "Пусть тьма уйдет"] },
        { frameDesc: "⚡ Супергерои, Нью-Йорк, юмор", title: "Друзья", phrases: ["Как ты? (How you doin'?)", "Мы в паузе!", "Я не знаю, но я в шоке!"] },
        { frameDesc: "📉 Техстартап, код, футболки", title: "Кремниевая долина", phrases: ["Сожги этот дом.", "Алгоритм сжатия", "Это не круто."] },
        { frameDesc: "🏛️ Белый дом, политика, интриги", title: "Карточный домик", phrases: ["Охота начинается.", "Я заслужил.", "Ты мне ничего не должен?"] },
        { frameDesc: "🔪 Маньяк, профилирование, ФБР", title: "Ганнибал", phrases: ["Я ем тех, кто грубит.", "Это моя кулинарная книга.", "Фагоцитоз"] },
        { frameDesc: "🎓 Колледж, испанский учитель, наркотрафик", title: "Нарко", phrases: ["Плата или пуля.", "Кокаиновая империя", "Пабло Эскобар"] },
        { frameDesc: "🧛 Вампиры, оборотни, мистика", title: "Дневники вампира", phrases: ["Стефан, помоги!", "Здравствуй, брат.", "Кольцо из вербены"] },
        { frameDesc: "🚀 Космос, инженер, марсианин", title: "Марсианин", phrases: ["Я научусь выращивать картошку.", "Влажный монолит", "Спасибо, Бек"] },
        { frameDesc: "🏢 Офис, скромные сотрудники, камера", title: "Офис", phrases: ["Менеджер года.", "Это то, что она сказала.", "Дуайт, стой!"] },
        { frameDesc: "🕰️ Шпионы, холодная война, разведка", title: "Американцы", phrases: ["Семья превыше всего.", "Родина ждет.", "Мы не убийцы."] },
        { frameDesc: "🔫 Зомби, выживание, Атланта", title: "Ходячие мертвецы", phrases: ["Укус означает смерть.", "Мы ходячие мертвецы.", "Не открывай дверь."] },
        { frameDesc: "💀 Шериф, дочь, монстры", title: "Сверхъестественное", phrases: ["Охотятся на монстров.", "Спасите людей.", "Солт-энд-берн"] },
        { frameDesc: "🕶️ 80-е, ностальгия, дети на велосипедах", title: "Очень странные дела (2)", phrases: ["Дартл", "Starcourt Mall", "Когти"] },
        { frameDesc: "🎸 Рок-звезда, музыкант, драма", title: "Дейзи Джонс и The Six", phrases: ["Запиши это в альбом.", "Я хочу чувствовать.", "Группа — это семья."] },
        { frameDesc: "🌌 Космическая опера, мандалорец", title: "Мандалорец", phrases: ["Это путь.", "Я могу позаботиться о себе.", "Не снимай шлем."] },
        { frameDesc: "⚖️ Юридическая драма, университет", title: "Линкольн для адвоката", phrases: ["Никаких свидетелей.", "Истина всплывет.", "Защитник"] },
        { frameDesc: "🕵️ Шерлок, Лондон, современность", title: "Шерлок", phrases: ["Элементарно, Ватсон.", "Я не псих, я высокоактивный.", "Mind palace"] },
        { frameDesc: "🐺 Магия, школа, Цинтры", title: "Ведьмак", phrases: ["Геральт из Ривии.", "Проклятие черного солнца.", "Монеты, брось монетку"] },
        { frameDesc: "💸 Мошенничество, биткоины, стартап", title: "Миллиарды", phrases: ["Акции растут.", "Хедж-фонд", "Бобби Аксельрод"] },
        { frameDesc: "🌊 Байкеры, преступность, Калифорния", title: "Сыны анархии", phrases: ["Мы семья.", "Месть холодна.", "Анархия"] }
    ];

    // гарантированно 25 сериалов (иногда некоторые дублируем если меньше, но у нас ровно 25)
    // Убедимся, что длина массива 25
    if (SERIES_DB.length !== 25) console.warn("Количество сериалов не 25, но визуально будет дополнено");
    // для безопасности: если меньше 25, продублируем несколько первых, но у нас 25 готовых!
    while(SERIES_DB.length < 25) SERIES_DB.push({...SERIES_DB[0]});
    if(SERIES_DB.length > 25) SERIES_DB.length = 25;

    // ============= ГЛОБАЛЬНОЕ СОСТОЯНИЕ =============
    let gridData = [];        // массив из 25 объектов { seriesRef, randomPhrase, revealed, id }
    let revealedCount = 0;
    let currentMessage = "🎬 Кликни по клетке, чтобы открыть!";
    
    const gridContainer = document.getElementById('gridContainer');
    const scoreSpan = document.getElementById('scoreValue');
    const statusMsgDiv = document.getElementById('statusMessage');
    const resetBtn = document.getElementById('resetBtn');

    // Вспомогательная функция: случайное число
    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Функция перемешивания массива (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Генерация новой сетки: 25 клеток, каждая получает случайный сериал из БД (перемешанной)
    // И для каждой клетки случайным образом выбирается фраза из phrases этого сериала
    function generateFreshGrid() {
        // создаём копию индексов сериалов (0..24) и перемешиваем
        let seriesIndices = [...Array(SERIES_DB.length).keys()];
        seriesIndices = shuffleArray(seriesIndices);
        
        const newGrid = [];
        for (let i = 0; i < 25; i++) {
            const seriesObj = SERIES_DB[seriesIndices[i % SERIES_DB.length]];
            // выбрать случайную фразу из массива phrases (от 0 до длины-1)
            const phraseList = seriesObj.phrases;
            const chosenPhrase = phraseList[randomInt(0, phraseList.length - 1)];
            newGrid.push({
                series: seriesObj,
                phrase: chosenPhrase,
                revealed: false,
                cellId: i
            });
        }
        return newGrid;
    }

    // обновление интерфейса (полная перерисовка)
    function renderGrid() {
        if (!gridContainer) return;
        gridContainer.innerHTML = '';
        for (let idx = 0; idx < gridData.length; idx++) {
            const cell = gridData[idx];
            const seriesItem = cell.series;
            const phraseText = cell.phrase;
            const isRevealed = cell.revealed;
            
            // создаем элемент клетки
            const card = document.createElement('div');
            card.className = 'card';
            if (isRevealed) card.classList.add('revealed');
            
            // Блок "кадр" — здесь мы не реальное изображение, а стилизованное описание кадра (имитация)
            // В требованиях "расписаны кадр из сериалов" — значит текстовое описание кадра
            const frameDiv = document.createElement('div');
            frameDiv.className = 'frame';
            // эмуляция фонового изображения через градиент и символы + текст описания кадра
            // чтобы было наглядно, вставим текст описания кадра в виде наложения
            frameDiv.style.background = `linear-gradient(125deg, #2c3e4e, #1b2b36), url('')`;
            frameDiv.style.backgroundBlend = 'overlay';
            // Добавляем иконку кино + описание кадра
            const frameTextSpan = document.createElement('span');
            frameTextSpan.style.position = 'absolute';
            frameTextSpan.style.bottom = '8px';
            frameTextSpan.style.left = '8px';
            frameTextSpan.style.backgroundColor = 'rgba(0,0,0,0.65)';
            frameTextSpan.style.padding = '3px 6px';
            frameTextSpan.style.borderRadius = '16px';
            frameTextSpan.style.fontSize = '0.65rem';
            frameTextSpan.style.color = '#ffecb3';
            frameTextSpan.style.fontWeight = 'bold';
            frameTextSpan.style.backdropFilter = 'blur(2px)';
            frameTextSpan.style.maxWidth = '90%';
            frameTextSpan.style.whiteSpace = 'nowrap';
            frameTextSpan.style.overflow = 'hidden';
            frameTextSpan.style.textOverflow = 'ellipsis';
            frameTextSpan.textContent = `📸 ${seriesItem.frameDesc}`;
            frameDiv.appendChild(frameTextSpan);
            
            // информационный блок
            const infoDiv = document.createElement('div');
            infoDiv.className = 'info';
            
            const titleSpan = document.createElement('div');
            titleSpan.className = 'series-name';
            titleSpan.textContent = seriesItem.title;
            
            const actionSpan = document.createElement('div');
            actionSpan.className = 'action-phrase';
            actionSpan.textContent = `💬 "${phraseText}"`;
            
            infoDiv.appendChild(titleSpan);
            infoDiv.appendChild(actionSpan);
            card.appendChild(frameDiv);
            card.appendChild(infoDiv);
            
            // обработчик клика (если ещё не открыта)
            if (!isRevealed) {
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleCellClick(idx);
                });
            } else {
                card.style.cursor = 'default';
            }
            
            gridContainer.appendChild(card);
        }
        // обновить счет
        scoreSpan.innerText = `${revealedCount}`;
        statusMsgDiv.innerText = currentMessage;
        if (revealedCount === 25) {
            statusMsgDiv.innerHTML = "🏆 ПОБЕДА! Ты знаток сериалов! 🎉 Нажми «Перетасовать» для новой игры.";
        }
    }
    
    // Обработка клика по клетке
    function handleCellClick(index) {
        const cell = gridData[index];
        if (cell.revealed) {
            currentMessage = "⚠️ Эта клетка уже угадана! Выбери другую.";
            statusMsgDiv.innerText = currentMessage;
            setTimeout(() => {
                if (revealedCount !== 25) currentMessage = "🎬 Продолжай кликать по клеткам!";
                else currentMessage = "🎉 Игра завершена, нажми сброс";
                statusMsgDiv.innerText = currentMessage;
            }, 1200);
            return;
        }
        
        // Открываем клетку: ставим revealed true, увеличиваем счёт
        cell.revealed = true;
        revealedCount++;
        currentMessage = `✅ Верно! "${cell.series.title}" — фраза "${cell.phrase}". Осталось ${25 - revealedCount} клеток.`;
        renderGrid(); // перерисовываем
        
        // если все открыты, показать особое сообщение
        if (revealedCount === 25) {
            currentMessage = "🌟 ПОЗДРАВЛЯЮ! Ты собрал все 25 сериалов! Гениально! 🌟";
            renderGrid();
        }
    }
    
    // Сброс/перетасовка игры
    function resetAndShuffle() {
        // генерируем новые данные: случайный порядок сериалов + случайные фразы из их набора
        const newGridRaw = [];
        // создаём массив сериалов, перемешанный
        let shuffledSeries = [...SERIES_DB];
        shuffledSeries = shuffleArray(shuffledSeries);
        // гарантируем 25 элементов, если вдруг короче, но у нас ровно 25
        for (let i = 0; i < 25; i++) {
            const seriesObj = shuffledSeries[i % shuffledSeries.length];
            const phraseOptions = seriesObj.phrases;
            const randomPhrase = phraseOptions[Math.floor(Math.random() * phraseOptions.length)];
            newGridRaw.push({
                series: seriesObj,
                phrase: randomPhrase,
                revealed: false,
                cellId: i
            });
        }
        gridData = newGridRaw;
        revealedCount = 0;
        currentMessage = "🎲 Колода перемешана! Все клетки снова закрыты. Угадывай сериалы по кадру и названию!";
        renderGrid();
    }
    
    // Инициализация приложения
    function initGame() {
        // первоначальное заполнение случайными сериалами и фразами
        const initialGrid = [];
        let tempSeries = [...SERIES_DB];
        tempSeries = shuffleArray(tempSeries);
        for (let i = 0; i < 25; i++) {
            const series = tempSeries[i % tempSeries.length];
            const phraseArray = series.phrases;
            const randPhrase = phraseArray[Math.floor(Math.random() * phraseArray.length)];
            initialGrid.push({
                series: series,
                phrase: randPhrase,
                revealed: false,
                cellId: i
            });
        }
        gridData = initialGrid;
        revealedCount = 0;
        currentMessage = "📺 Игра началась! В каждой клетке — кадр, название сериала и случайная фраза. Кликни, чтобы угадать!";
        renderGrid();
    }
    
    // обработчик кнопки сброса
    resetBtn.addEventListener('click', () => {
        resetAndShuffle();
    });
    
    // запуск
    initGame();
</script>
</body>
</html>
